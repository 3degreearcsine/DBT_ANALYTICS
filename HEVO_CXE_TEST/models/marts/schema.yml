version: 2

models:
  - name: dim_customer_summary
    description: "One row per customer with aggregated lifetime metrics"

    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_customers')
              field: customer_id
              
      - name: first_name
        tests:
          - not_null
          
      - name: last_name
        tests:
          - not_null
          
      - name: number_of_orders
        tests:
          - not_null

      - name: customer_lifetime_value
        tests:
          - not_null